<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub - Dashboard Direktori</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER UTAMA -->
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo" onclick="window.location.reload()">VideoHub</h1>
            <!-- Tombol Tambah Postingan -->
            <button class="add-post-btn" onclick="openModal('create')">➕ Tambah Postingan</button>
        </div>
    </header>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
        <div class="section-info">
            <h2>Koleksi Tautan Media</h2>
            <p>Direktori tautan eksternal dengan pratinjau konten dinamis.</p>
        </div>

        <!-- Grid Tampilan Konten -->
        <div id="video-grid" class="video-grid">
            <p class="status-msg">Memuat data dari database...</p>
        </div>
    </main>

    <!-- JENDELA POPUP (MODAL FORM) -->
    <div id="post-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">Tambah Postingan Baru</h3>
                <button class="close-modal-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <!-- Input ID Tersembunyi untuk proses Edit -->
                <input type="hidden" id="form-post-id">

                <!-- Judul -->
                <div class="form-group">
                    <label for="form-title">Judul Postingan</label>
                    <input type="text" id="form-title" placeholder="Masukkan judul video/konten...">
                </div>

                <!-- Bagian Thumbnail (URL atau Unggah Lokal) -->
                <div class="form-group">
                    <label>Thumbnail Gambar (Fleksibel)</label>
                    <div class="tab-header">
                        <button type="button" id="tab-btn-url" class="tab-link active" onclick="switchThumbInput('url')">Salin URL Gambar</button>
                        <button type="button" id="tab-btn-file" class="tab-link" onclick="switchThumbInput('file')">Unggah dari Perangkat</button>
                    </div>
                    
                    <!-- Input Tipe URL Gambar -->
                    <div id="thumb-url-container" class="tab-content">
                        <input type="url" id="form-thumbnail-url" placeholder="https://example.com/gambar.jpg">
                    </div>
                    
                    <!-- Input Tipe File Lokal -->
                    <div id="thumb-file-container" class="tab-content" style="display: none;">
                        <input type="file" id="form-thumbnail-file" accept="image/*" onchange="handleLocalFileSelect(event)">
                        <div id="file-preview-container" style="display: none; margin-top: 10px;">
                            <img id="file-preview-img" src="" alt="Pratinjau Gambar" style="max-height: 120px; border-radius: 6px; border: 1px solid #27272a;">
                            <button type="button" class="clear-file-btn" onclick="clearSelectedFile()">Hapus Gambar</button>
                        </div>
                    </div>
                    
                    <!-- Penyimpan Data Base64 / URL Final yang akan dikirim -->
                    <input type="hidden" id="form-thumbnail-final">
                    <small>Pratinjau gambar akan otomatis menyesuaikan ukuran aslinya di beranda.</small>
                </div>

                <!-- Bagian URL Tujuan Dinamis (Satu atau Lebih) -->
                <div class="form-group">
                    <label>URL Tautan Tujuan (Unlimited)</label>
                    <div id="links-container" class="links-dynamic-list">
                        <!-- Kolom Input Tautan akan dirender secara dinamis oleh JavaScript -->
                    </div>
                    <button type="button" class="add-link-field-btn" onclick="addLinkField('', '')">➕ Tambah Tautan Lain</button>
                </div>

                <div id="modal-error" class="error-banner" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <!-- Tombol Hapus Postingan -->
                <button id="delete-btn" class="danger-btn" onclick="deletePost()" style="display: none;">🗑️ Hapus Postingan</button>
                <div class="footer-right-actions">
                    <button class="cancel-btn" onclick="closeModal()">Batal</button>
                    <button id="save-btn" class="submit-btn" onclick="savePostSubmit()">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Menghubungkan ke berkas javascript apps.js -->
    <script src="apps.js"></script>
</body>
</html>
